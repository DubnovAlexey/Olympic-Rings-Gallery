<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/zoich.png" type="image/x-icon">
    <title>Olympic Rings Gallery</title>
</head>
<body>
<div class="container">
    <div class="zoich-wrapper">
        <img src="img/zoich.png" id="zoich" alt="zoich" class="zoich">

        <div class="tooltip"><i>Click</i></div>
    </div>
    <audio id="my-audio"></audio>

    <div class="rings-wrapper">
        <div class="ring blue"></div>
        <div class="ring black"></div>
        <div class="ring yellow"></div>
        <div class="ring red"></div>
        <div class="ring green"></div>
    </div>
</div>

<script>
    const icon = document.getElementById('zoich');
    const audio = document.getElementById('my-audio');
    const rings = document.querySelectorAll('.ring');

    const playlist = [
        "music/Röyksopp%20&%20Robyn%20Monument%20(Music%20Video).mp3", // Синее кольцо
        "music/track2.mp3",                                          // Чёрное кольцо
        "music/track3.mp3",                                          // Жёлтое кольцо
        "music/track4.mp3",                                          // Красное кольцо
        "music/track5.mp3"                                           // Зелёное кольцо
    ];

    let currentTrackIndex = 0;

    function loadTrack(index) {
        audio.src = playlist[index];
    }

    // Синхронизация лавы: активное горит ярко, остальные — в режиме ожидания
    function syncLavaWithTrack() {
        rings.forEach(ring => ring.classList.remove('lava-active'));

        if (!audio.paused) {
            rings[currentTrackIndex].classList.add('lava-active');
        }
    }
    loadTrack(currentTrackIndex);

    /* --- МАГИЯ ИНТЕРАКТИВНОГО ПУЛЬТА (Клик по кольцам) --- */
    rings.forEach((ring, index) => {
        ring.addEventListener('click', () => {

            if (currentTrackIndex === index && !audio.paused) {
                audio.pause();
                icon.classList.remove('playing');
            } else {

                currentTrackIndex = index;
                loadTrack(currentTrackIndex);
                audio.play();
                icon.classList.add('playing');
            }
            syncLavaWithTrack();
        });
    });

    icon.addEventListener('click', () => {
        if (audio.paused) {
            audio.play();
            icon.classList.add('playing');
        } else {
            audio.pause();
            audio.currentTime = 0;
            icon.classList.remove('playing');
        }
        syncLavaWithTrack();
    });

    audio.addEventListener('ended', () => {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        audio.play();
        syncLavaWithTrack();
    });

</script>

</body>
</html>
